<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Keys - Configuration</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gesture Keys</h1>
            <div class="status-bar">
                <span id="status-indicator" class="status-dot"></span>
                <span id="status-text">Loading...</span>
                <button id="toggle-btn" class="btn btn-toggle">Enable</button>
            </div>
        </header>

        <div class="main-layout">
            <section class="video-section">
                <div class="video-wrapper">
                    <img id="video-feed" src="/api/feed" alt="Webcam Feed">
                </div>
                <div class="detection-info">
                    <span class="label">Detected:</span>
                    <span id="detected-gesture" class="gesture-name">None</span>
                    <span id="detected-confidence" class="confidence">(0%)</span>
                </div>
            </section>

            <section class="config-section">
                <h2>Gesture Mappings</h2>
                <p class="section-hint">Click the shortcut field and press your key combination (up to 3 keys)</p>
                <div id="mappings-list" class="mappings-list">
                    <!-- Populated by JS -->
                </div>

                <h2>Settings</h2>
                <div class="settings">
                    <div class="setting-row">
                        <label for="cooldown">Cooldown (ms):</label>
                        <input type="range" id="cooldown" min="100" max="3000" step="100">
                        <span id="cooldown-value">800</span>
                    </div>
                    <div class="setting-row">
                        <label for="threshold">Confidence Threshold:</label>
                        <input type="range" id="threshold" min="0.3" max="1.0" step="0.05">
                        <span id="threshold-value">0.70</span>
                    </div>
                </div>

                <button id="save-btn" class="btn btn-save">Save Configuration</button>
                <span id="save-status" class="save-status"></span>
            </section>
        </div>
    </div>

    <!-- Preset modal -->
    <div id="preset-modal" class="modal-overlay" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3>Quick Presets</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preset-grid" id="preset-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
